<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div>
  
    <form action="">
      <fieldset id="fieldset">
        <div id="left"></div>
        <div id="right">
          <p id="head"><strong>LOGIN</strong></p>
        <div>
          <img id="log" src="images/new.png" alt="">
        </div>
        <div class="inputinfo">
        <label class="label" for="name">USERNAME:</label>
        <input class="input" type="name" placeholder="enter your username" required>
      </div><br>
      <div>
        <label class="label" for="password">PASSWORD:</label>
        <input class="input" type="password" placeholder="must be more than 8 characters" required>
      </div><br>
      <div id="links">
        <a id="tosignup" href="signup.html">Sign up</a>
        <a id="toforgotpassword" href="forgot-password.html">Forgot password?</a>
      </div>
      
      <div>
        <input type="checkbox" id="remember">
        <label id="rem" class="label" for="remember">Remember me</label>
      </div><br>
      <div class="inputinfo">
        <!-- <button onclick="">login</button> -->
        <input id="submit" type="submit">
      </div>
        </div>
        
      </fieldset>
    </form>
  </div>

</body>
</html>
